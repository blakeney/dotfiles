##### Appearance

set -g status-style "bg=green,fg=white,bold"
set -g message-style "bg=green,fg=white,bold"
set -g message-command-style "bg=green,fg=white,bold"
set -g pane-border-style "fg=green"
set -g pane-active-border-style "fg=green,bg=default"

##### Prefix

unbind C-b
set -g prefix C-t
bind C-t send-prefix

##### General behavior

set -g renumber-windows on
set -g status-keys emacs
set -g mode-keys vi
set -g mouse on

##### Pane and window navigation

unbind l
unbind L

bind ^ last-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Keep pane zoom when moving between panes
bind H select-pane -L \; resize-pane -Z
bind J select-pane -D \; resize-pane -Z
bind K select-pane -U \; resize-pane -Z
bind L select-pane -R \; resize-pane -Z

##### Copy mode

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

##### New panes/windows inherit current pane directory

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

##### Toggles

# Toggle synchronized input for the current window
bind y if-shell -F '#{window_synchronize_panes}' \
  'set -w synchronize-panes off \; display-message "Sync panes: OFF"' \
  'set -w synchronize-panes on  \; display-message "Sync panes: ON"'

# Toggle mouse support
bind m if-shell -F '#{mouse}' \
  'set -g mouse off \; display-message "Mouse: OFF"' \
  'set -g mouse on  \; display-message "Mouse: ON"'

##### Convenience

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
